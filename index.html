<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLNCE Contact Form</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --navy: #003366;
  --navy-deep: #001F3F;
  --sky: #4A90D9;
  --gold: #E8A94A;
  --mist: #F4F6F9;
  --ink-soft: #5A6472;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  background:
    radial-gradient(circle at 10% 10%, rgba(74,144,217,0.15), transparent 40%),
    radial-gradient(circle at 90% 90%, rgba(232,169,74,0.12), transparent 40%),
    linear-gradient(160deg, var(--navy-deep), var(--navy));
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.page {
  width: 100%;
  max-width: 380px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.logo {
  width: 92px;
  height: 92px;
  object-fit: contain;
  border-radius: 50%;
  background: #fff;
  padding: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  margin-bottom: 18px;
}

.main-heading {
  font-family: 'Fraunces', serif;
  color: white;
  font-size: 32px;
  margin-bottom: 4px;
}

.sub-heading {
  color: rgba(244,246,249,0.7);
  font-size: 14px;
  margin-bottom: 32px;
}

.login-card {
  width: 100%;
  background: white;
  padding: 32px 28px;
  border-radius: 16px;
  box-shadow: 0 20px 50px rgba(0,15,40,0.35);
}

.login-card h2 {
  font-family: 'Fraunces', serif;
  color: var(--navy);
  margin-bottom: 22px;
}

.field {
  text-align: left;
  margin-bottom: 16px;
}

.field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-soft);
  margin-bottom: 6px;
  text-transform: uppercase;
}

input, textarea {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid #DCE1E8;
  border-radius: 8px;
  font-size: 15px;
  background: var(--mist);
}

textarea {
  resize: vertical;
  min-height: 100px;
}

button {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, var(--navy), #002347);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}

button:hover {
  background: linear-gradient(135deg, #004a99, var(--navy));
}

.status-msg {
  margin-top: 14px;
  font-size: 13px;
  color: var(--navy);
}
</style>
</head>

<body>

<div class="page">
  <img src="logo.png" alt="KLNCE Logo" class="logo">

  <h1 class="main-heading">KLNCE</h1>
  <p class="sub-heading">KLN College of Engineering</p>

  <div class="login-card">
    <h2>Contact Form</h2>

    <form
      action="https://formspree.io/f/maqryqpy"
      method="POST">

      <div class="field">
        <label for="username">Name</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Enter your name"
          required>
      </div>

      <div class="field">
        <label for="password">Email</label>
        <input
          type="password"
          id="email"
          name="email"
          placeholder="Enter your email"
          required>
      </div>

     

      <button type="submit">Submit</button>
    </form>

    <p class="status-msg">
      Demo form powered by Formspree.
    </p>
  </div>
</div>

</body>
</html>
