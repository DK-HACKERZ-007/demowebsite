<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLNCE Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f0f2f5;
        }

        /* Header */
        .header {
            background-color: #003366;
            color: white;
            display: flex;
            align-items: center;
            padding: 15px 30px;
        }

        .logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
            background-color: white;
            border-radius: 50%;
            padding: 5px;
        }

        .title-container {
            margin-left: 20px;
        }

        .title-container h1 {
            font-size: 35px;
        }

        .title-container h2 {
            font-size: 20px;
            font-weight: normal;
        }

        /* Login Form */
        .login-container {
            width: 350px;
            background: white;
            margin: 80px auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        .login-container h2 {
            text-align: center;
            color: #003366;
            margin-bottom: 20px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        .show-password {
            margin: 10px 0 20px 0;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #003366;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0055aa;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="header">
        <!-- Replace logo.png with your logo file -->
        <img src="logo.png" alt="KLNCE Logo" class="logo">

        <div class="title-container">
            <h1>KLNCE</h1>
            <h2>KLN College of Engineering</h2>
        </div>
    </div>

    <!-- Login Form -->
    <div class="login-container">
        <h2>Login</h2>

        <form>
            <input type="text" placeholder="Username" required>

            <input type="password" id="password" placeholder="Password" required>

            <div class="show-password">
                <input type="checkbox" onclick="togglePassword()">
                <label> Show Password</label>
            </div>

            <button type="submit">Submit</button>
        </form>
    </div>

    <script>
        function togglePassword() {
            var passwordField = document.getElementById("password");

            if (passwordField.type === "password") {
                passwordField.type = "text";
            } else {
                passwordField.type = "password";
            }
        }
    </script>

</body>
</html>
