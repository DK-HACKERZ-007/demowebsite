<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLNCE Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            min-height: 100vh;
        }

        /* Logo at top left */
        .logo-container {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        /* Center content */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 120px;
        }

        .main-heading {
            color: #003366;
            font-size: 40px;
            margin-bottom: 10px;
        }

        .sub-heading {
            color: #555;
            margin-bottom: 30px;
            font-size: 18px;
        }

        /* Login Form */
        .login-container {
            width: 350px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
        }

        .login-container h2 {
            text-align: center;
            color: #003366;
            margin-bottom: 20px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        .show-password {
            margin: 10px 0 20px 0;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #003366;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0055aa;
        }
    </style>
</head>
<body>

    <!-- Logo -->
    <div class="logo-container">
        <img src="logo.png" alt="KLNCE Logo" class="logo">
    </div>

    <!-- Center Content -->
    <div class="container">
        <h1 class="main-heading">KLNCE</h1>
        <p class="sub-heading">KLN College of Engineering</p>

        <div class="login-container">
            <h2>Login</h2>

            <form>
                <input type="text" placeholder="Username" required>

                <input type="password" id="password" placeholder="Password" required>

                <div class="show-password">
                    <input type="checkbox" onclick="togglePassword()">
                    <label> Show Password</label>
                </div>

                <button type="submit">Submit</button>
            </form>
        </div>
    </div>

    <script>
        function togglePassword() {
            const password = document.getElementById("password");
            password.type = password.type === "password" ? "text" : "password";
        }
    </script>

</body>
</html>
